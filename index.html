<!DOCTYPE html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Pochak</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
    *{box-sizing:border-box}
    body{background:#000;color:#fff;margin:0;padding:0;font-family:sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
    .top-bar{padding:4px;background:#111;border-bottom:1px solid #222;display:flex;gap:4px;align-items:center}
    .tab-btn{padding:4px 10px;background:#222;color:#888;border:1px solid #333;border-radius:3px;cursor:pointer;font-size:11px;font-weight:bold}
    .tab-btn.active{background:#0f0;color:#000;border-color:#0f0}
    input{flex:1;padding:4px 8px;background:#000;border:1px solid #333;color:#0f0;font-size:12px;border-radius:3px}
    .scan-btn{padding:4px 10px;background:#0f0;font-weight:bold;border:none;border-radius:3px;font-size:11px;cursor:pointer;color:#000}
    .logout-btn{padding:4px 8px;background:#222;color:#888;border:1px solid #333;border-radius:3px;font-size:10px;text-decoration:none;white-space:nowrap;cursor:pointer;border:1px solid #333}
    .logout-btn:hover{color:#0f0;border-color:#0f0}
    .main-layout{display:flex;flex:1;overflow:hidden}
    .side-menu{width:145px;min-width:145px;border-right:1px solid #222;overflow-y:auto;padding:3px;background:#080808}
    .content-area{flex:1;padding:4px;background:#000;display:flex;flex-direction:column;align-items:center;overflow-y:auto}
    .vod-item{background:#111;padding:4px;margin-bottom:3px;border:1px solid #222;border-radius:3px;cursor:pointer}
    .vod-item:hover{border-color:#0f0}
    .vod-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:2px;margin-bottom:3px;background:#222}
    .vod-title{color:#fff;font-size:9px;line-height:1.2}
    .date-label{color:#0f0;display:block;font-size:8px}
    .sport-label{color:#888;display:block;font-size:8px;margin-bottom:2px}
    .live-item{background:#111;padding:5px;margin-bottom:3px;border:1px solid #222;border-radius:3px;cursor:pointer;font-size:9px}
    .live-item:hover,.live-item.active{border-color:#0f0}
    .live-name{color:#fff;font-weight:bold;margin-bottom:2px}
    .live-meta{color:#888;font-size:8px}
    .live-status{color:#0f0;font-size:8px}
    .reload-btn{width:100%;padding:5px;background:#222;border:1px solid #333;color:#0f0;border-radius:3px;cursor:pointer;font-size:9px;margin-bottom:3px}
    .cam-btns{display:flex;gap:4px;flex-wrap:wrap;width:100%;max-width:500px;margin-bottom:6px}
    .cam-btn{flex:1;padding:8px 4px;border:1px solid #444;border-radius:4px;cursor:pointer;font-size:10px;font-weight:bold;min-width:60px;text-align:center;background:#111}
    .cam-btn.active{border-width:2px}
    video{width:100%;height:auto;max-height:70vh;background:#111;border:1px solid #333}
    #v-name{color:#0f0;font-size:10px;margin:3px 0;text-align:center}
    #loading{color:#0f0;font-size:11px;text-align:center;padding:10px;display:none}
    #total-count{color:#888;font-size:9px;padding:3px;text-align:center}
    .vod-search-bar{display:none;flex:1;gap:4px}
    /* 로그인 화면 */
    #login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center}
    .login-box{background:#111;border:1px solid #222;border-radius:8px;padding:28px;width:90%;max-width:380px}
    .login-box h2{color:#0f0;text-align:center;margin:0 0 20px 0;font-size:16px}
    .login-tabs{display:flex;gap:4px;margin-bottom:20px}
    .login-tab{flex:1;padding:8px;background:#222;border:1px solid #333;border-radius:4px;cursor:pointer;font-size:12px;text-align:center;color:#888}
    .login-tab.active{background:#0f0;color:#000;border-color:#0f0;font-weight:bold}
    .login-panel{display:none}
    .login-panel.active{display:block}
    .field{margin-bottom:10px}
    .field label{display:block;color:#888;font-size:11px;margin-bottom:3px}
    .field input{width:100%;padding:10px;background:#000;border:1px solid #333;color:#0f0;border-radius:4px;font-size:14px}
    .field input:focus{border-color:#0f0;outline:none}
    .login-btn{width:100%;padding:10px;background:#0f0;border:none;border-radius:4px;font-weight:bold;font-size:14px;cursor:pointer;color:#000;margin-top:4px}
    .err-msg{color:#f00;font-size:12px;text-align:center;margin-bottom:10px;padding:8px;background:#f001;border:1px solid #f003;border-radius:4px;display:none}
    .register-link{color:#0f0;text-decoration:none;font-size:12px;display:block;text-align:center;margin-top:10px}
    /* 서비스 중단 */
    #service-off-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:9999;align-items:center;justify-content:center;flex-direction:column;text-align:center}
    #service-off-overlay h2{color:#f00;margin-bottom:10px}
    #service-off-overlay p{color:#888;font-size:13px}
    /* 비밀번호 변경 */
    #pw-change-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9998;align-items:center;justify-content:center}
</style>
</head><body>

<!-- 서비스 중단 오버레이 -->
<div id="service-off-overlay">
    <h2>🚫 서비스 중단</h2>
    <p>관리자에 의해 서비스가 중단되었습니다.</p>
    <a href="#" onclick="doLogout()" style="color:#0f0;margin-top:20px;display:block">로그아웃</a>
</div>

<!-- 로그인 화면 -->
<div id="login-screen">
    <div class="login-box">
        <h2 id="login-title">📡 Pochak</h2>
        <div class="err-msg" id="err-msg"></div>
        <div class="login-tabs">
            <div class="login-tab active" onclick="showLoginTab('code',this)">🔑 코드 입장</div>
            <div class="login-tab" onclick="showLoginTab('user',this)">👤 ID/PW 로그인</div>
        </div>
        <div class="login-panel active" id="login-code">
            <div class="field"><label>입장 코드</label><input id="code-input" placeholder="코드를 입력하세요" autocomplete="off"></div>
            <button class="login-btn" onclick="loginCode()">입장하기</button>
        </div>
        <div class="login-panel" id="login-user">
            <div class="field"><label>아이디</label><input id="username-input" placeholder="아이디"></div>
            <div class="field"><label>비밀번호</label><input id="password-input" type="password" placeholder="비밀번호"></div>
            <button class="login-btn" onclick="loginUser()">로그인</button>
        </div>
        <a href="#" class="register-link" onclick="showRegister()">📝 ID 신청하기</a>
    </div>
</div>

<!-- 신청 화면 -->
<div id="register-screen" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;align-items:center;justify-content:center">
    <div class="login-box">
        <h2>📝 ID 신청</h2>
        <div class="err-msg" id="reg-err-msg"></div>
        <div class="field">
            <label>아이디 신청</label>
            <input id="reg-username" placeholder="예: 홍길동아빠, 이순신엄마, 김철수코치" autocomplete="off" maxlength="20">
            <div style="color:#555;font-size:10px;margin-top:4px">예: 홍길동아빠, 이순신엄마, 김철수코치</div>
        </div>
        <button class="login-btn" onclick="doRegister()">신청하기</button>
        <a href="#" class="register-link" onclick="showLogin()" style="color:#888">← 돌아가기</a>
        <div style="color:#555;font-size:11px;text-align:center;margin-top:10px">승인 후 기본 비밀번호 0005로 로그인하세요</div>
    </div>
</div>

<!-- 비밀번호 변경 화면 -->
<div id="pw-change-screen">
    <div class="login-box">
        <h2>🔑 비밀번호 변경</h2>
        <div style="color:#f00;font-size:12px;text-align:center;margin-bottom:12px;padding:8px;background:#f001;border:1px solid #f003;border-radius:4px">⚠ 기본 비밀번호를 변경해야 이용할 수 있습니다.</div>
        <div class="err-msg" id="pw-err-msg"></div>
        <div class="field"><label>새 비밀번호 (숫자 2자리 추천)</label><input id="new-pw" type="password" placeholder="새 비밀번호"></div>
        <div class="field"><label>새 비밀번호 확인</label><input id="new-pw2" type="password" placeholder="비밀번호 확인"></div>
        <button class="login-btn" onclick="doPwChange()">변경하기</button>
    </div>
</div>

<!-- 메인 앱 -->
<div id="app-screen" style="display:none;flex-direction:column;height:100vh">
    <div class="top-bar">
        <button class="tab-btn active" id="tab-live" onclick="switchTab('live')">📡 LIVE</button>
        <button class="tab-btn" id="tab-vod" onclick="switchTab('vod')">🎬 VOD</button>
        <div class="vod-search-bar" id="vod-search-bar">
            <input type="text" id="kw" placeholder="팀명 또는 지역 검색">
            <button class="scan-btn" onclick="loadVod()">스캔</button>
        </div>
        <button class="logout-btn" id="top-btn" onclick="topBtnClick()">👤</button>
    </div>
    <div class="main-layout">
        <div class="side-menu" id="side-menu">
            <div style="color:#555;font-size:9px;text-align:center;padding:10px">로딩중...</div>
        </div>
        <div class="content-area">
            <h4 id="v-name"></h4>
            <video id="video" controls autoplay playsinline></video>
            <div id="loading">⏳ 로딩중...</div>
            <div style="color:#444;font-size:10px;text-align:center;padding:4px">※ 오래된 영상은 재생이 안될 수 있습니다.</div>
            <div class="cam-btns" id="cam-btns"></div>
        </div>
    </div>
</div>

<script>
const API = 'http://146.56.111.100:8766';
const hls = new Hls();
const video = document.getElementById('video');
let curStreams = [];
let sessionToken = localStorage.getItem('pochak_token');
let currentUser = null;

// 시작시 세션 체크
window.onload = async () => {
    if (sessionToken) {
        await checkSession();
    }
};

async function checkSession() {
    try {
        const resp = await fetch(API + '/api/check', {
            headers: {'Authorization': 'Bearer ' + sessionToken}
        });
        const data = await resp.json();
        if (data.ok) {
            currentUser = data.user;
            showApp();
        } else {
            localStorage.removeItem('pochak_token');
            sessionToken = null;
        }
    } catch(e) {}
}

function showLoginTab(t, el) {
    document.querySelectorAll('.login-tab').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.login-panel').forEach(e=>e.classList.remove('active'));
    document.getElementById('login-'+t).classList.add('active');
    el.classList.add('active');
}

function showErr(id, msg) {
    const el = document.getElementById(id);
    el.innerText = msg;
    el.style.display = 'block';
}

function hideErr(id) {
    document.getElementById(id).style.display = 'none';
}

async function loginCode() {
    const code = document.getElementById('code-input').value.trim();
    if (!code) return;
    hideErr('err-msg');
    try {
        const resp = await fetch(API + '/api/login/code', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code})
        });
        const data = await resp.json();
        if (data.success) {
            sessionToken = data.token;
            currentUser = data.user;
            localStorage.setItem('pochak_token', sessionToken);
            showApp();
        } else {
            showErr('err-msg', '⚠ ' + data.message);
        }
    } catch(e) { showErr('err-msg', '⚠ 서버 연결 오류'); }
}

async function loginUser() {
    const username = document.getElementById('username-input').value.trim();
    const password = document.getElementById('password-input').value;
    if (!username || !password) return;
    hideErr('err-msg');
    try {
        const resp = await fetch(API + '/api/login/user', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        const data = await resp.json();
        if (data.success) {
            sessionToken = data.token;
            currentUser = data.user;
            localStorage.setItem('pochak_token', sessionToken);
            if (data.need_pw_change) {
                showPwChange();
            } else {
                showApp();
            }
        } else {
            showErr('err-msg', '⚠ ' + data.message);
        }
    } catch(e) { showErr('err-msg', '⚠ 서버 연결 오류'); }
}

async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    if (!username) return;
    hideErr('reg-err-msg');
    try {
        const resp = await fetch(API + '/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username})
        });
        const data = await resp.json();
        if (data.success) {
            document.getElementById('register-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            showErr('err-msg', '✅ 신청 완료! 승인 후 이용 가능합니다.');
            document.getElementById('err-msg').style.color = '#0f0';
            document.getElementById('err-msg').style.background = '#0f01';
            document.getElementById('err-msg').style.borderColor = '#0f03';
        } else {
            showErr('reg-err-msg', '⚠ ' + data.message);
        }
    } catch(e) { showErr('reg-err-msg', '⚠ 서버 연결 오류'); }
}

async function doPwChange() {
    const newPw = document.getElementById('new-pw').value;
    const newPw2 = document.getElementById('new-pw2').value;
    hideErr('pw-err-msg');
    if (newPw !== newPw2) { showErr('pw-err-msg', '⚠ 비밀번호가 일치하지 않습니다.'); return; }
    if (newPw.length < 2) { showErr('pw-err-msg', '⚠ 너무 짧습니다.'); return; }
    if (newPw === '0005') { showErr('pw-err-msg', '⚠ 기본 비밀번호와 다르게 설정해주세요.'); return; }
    try {
        const resp = await fetch(API + '/api/change-password', {
            method: 'POST',
            headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+sessionToken},
            body: JSON.stringify({new_pw: newPw})
        });
        const data = await resp.json();
        if (data.success) {
            document.getElementById('pw-change-screen').style.display = 'none';
            showApp();
        } else {
            showErr('pw-err-msg', '⚠ ' + data.message);
        }
    } catch(e) { showErr('pw-err-msg', '⚠ 서버 연결 오류'); }
}

function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('register-screen').style.display = 'none';
    document.getElementById('pw-change-screen').style.display = 'none';
    const app = document.getElementById('app-screen');
    app.style.display = 'flex';
    // 상단 버튼
    const isCode = currentUser && currentUser.type === 'code';
    const btn = document.getElementById('top-btn');
    if (isCode) {
        btn.innerText = '🚪 로그아웃';
    } else {
        btn.innerText = '👤 ' + (currentUser && currentUser.label || '내 정보');
    }
    loadLive();
    // 30초마다 체크
    setInterval(periodicCheck, 30000);
}

function showPwChange() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('pw-change-screen').style.display = 'flex';
}

function showRegister() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('register-screen').style.display = 'flex';
}

function showLogin() {
    document.getElementById('register-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
}

function topBtnClick() {
    const isCode = currentUser && currentUser.type === 'code';
    if (isCode) {
        doLogout();
    } else {
        showMypage();
    }
}

function doLogout() {
    localStorage.removeItem('pochak_token');
    sessionToken = null;
    currentUser = null;
    hls.detachMedia(); video.src = '';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('service-off-overlay').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
}

function showMypage() {
    window.open(API + '/mypage-redirect?token=' + sessionToken, '_blank');
}

async function periodicCheck() {
    try {
        const resp = await fetch(API + '/api/check', {
            headers: {'Authorization': 'Bearer ' + sessionToken}
        });
        if (resp.status === 401) {
            const data = await resp.json();
            if (data.reason === 'service_off') {
                hls.detachMedia(); video.src = '';
                document.getElementById('service-off-overlay').style.display = 'flex';
            } else {
                doLogout();
            }
        } else {
            document.getElementById('service-off-overlay').style.display = 'none';
        }
    } catch(e) {}
}

function handleApiError(data) {
    if (data && data.error) {
        if (data.error === 'service_off') {
            hls.detachMedia(); video.src = '';
            document.getElementById('service-off-overlay').style.display = 'flex';
        } else {
            doLogout();
        }
        return true;
    }
    return false;
}

function authHeaders() {
    return {'Authorization': 'Bearer ' + sessionToken};
}

function switchTab(tab) {
    document.getElementById('tab-live').classList.toggle('active', tab==='live');
    document.getElementById('tab-vod').classList.toggle('active', tab==='vod');
    document.getElementById('vod-search-bar').style.display = tab==='vod' ? 'flex' : 'none';
    document.getElementById('cam-btns').innerHTML = '';
    document.getElementById('v-name').innerText = '';
    hls.detachMedia(); video.src = '';
    if (tab==='live') loadLive();
    else document.getElementById('side-menu').innerHTML = '<div style="color:#555;font-size:9px;text-align:center;padding:10px">키워드 입력 후 스캔</div>';
}

async function loadLive() {
    const menu = document.getElementById('side-menu');
    menu.innerHTML = '<div style="color:#555;font-size:9px;text-align:center;padding:10px">로딩중...</div>';
    try {
        const resp = await fetch(API + '/api/live-list', {headers: authHeaders()});
        const data = await resp.json();
        if (handleApiError(data)) return;
        if (!data.list.length) { menu.innerHTML = '<div style="color:#888;font-size:9px;text-align:center;padding:10px">현재 라이브 없음</div>'; return; }
        menu.innerHTML = '<button class="reload-btn" onclick="loadLive()">🔄 새로고침</button>' +
            data.list.map(v => `
            <div class="live-item" onclick="grabLive(this,'${v.m_id}','${v.name}')">
                <div class="live-status">● ${v.status}</div>
                <div class="live-name">${v.name}</div>
                <div class="live-meta">${v.sport} · ${v.park}</div>
            </div>`).join('');
    } catch(e) { menu.innerHTML = '<div style="color:#f00;font-size:9px;padding:10px">오류</div>'; }
}

async function grabLive(el, m_id, name) {
    document.querySelectorAll('.live-item').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('v-name').innerText = name;
    document.getElementById('cam-btns').innerHTML = '';
    document.getElementById('loading').style.display = 'block';
    try {
        const resp = await fetch(API + '/api/get-live?m_id=' + m_id, {headers: authHeaders()});
        const data = await resp.json();
        document.getElementById('loading').style.display = 'none';
        if (handleApiError(data)) return;
        if (!data.streams.length) { document.getElementById('v-name').innerText = '스트림 없음'; return; }
        curStreams = data.streams; renderCamBtns(); playStream(0);
    } catch(e) { document.getElementById('loading').style.display = 'none'; }
}

async function loadVod() {
    const kw = document.getElementById('kw').value;
    if (!kw) return;
    const menu = document.getElementById('side-menu');
    menu.innerHTML = '<div style="color:#0f0;font-size:9px;text-align:center;padding:10px">⏳ 로딩중...</div>';
    try {
        const resp = await fetch(API + '/api/search-list?keyword=' + encodeURIComponent(kw), {headers: authHeaders()});
        const data = await resp.json();
        if (handleApiError(data)) return;
        if (!data.list.length) { menu.innerHTML = '<div style="color:#f00;font-size:9px;text-align:center;padding:10px">결과 없음</div>'; return; }
        menu.innerHTML = '<div id="total-count">총 ' + data.total + '개</div>' +
            data.list.map(v => `
            <div class="vod-item" onclick="grabVod(this,'${v.vod_id}','${v.match_id}','${v.line1} ${v.line2}')">
                <img class="vod-thumb" src="${v.thumbnail}" onerror="this.style.display='none'" loading="lazy">
                <div class="vod-title">
                    <span class="sport-label">${v.sport} · ${v.competition}</span>
                    <span class="date-label">${v.line1}</span>
                    ${v.line2}
                </div>
            </div>`).join('');
    } catch(e) { menu.innerHTML = '<div style="color:#f00;font-size:9px;padding:10px">오류</div>'; }
}

async function grabVod(el, vod_id, match_id, name) {
    document.querySelectorAll('.vod-item').forEach(b => b.style.borderColor='#222');
    el.style.borderColor = '#0f0';
    document.getElementById('v-name').innerText = name;
    document.getElementById('cam-btns').innerHTML = '';
    document.getElementById('loading').style.display = 'block';
    try {
        const resp = await fetch(API + '/api/get-vod?vod_id=' + vod_id + '&match_id=' + match_id, {headers: authHeaders()});
        const data = await resp.json();
        document.getElementById('loading').style.display = 'none';
        if (handleApiError(data)) return;
        if (!data.streams.length) { document.getElementById('v-name').innerText = '스트림 없음'; return; }
        curStreams = data.streams; renderCamBtns(); playStream(0);
    } catch(e) { document.getElementById('loading').style.display = 'none'; }
}

const typeColor = {'중계':'#0f0','파노라마':'#0ff','하이라이트':'#ff0'};
const typeIcon  = {'중계':'📺','파노라마':'🎥','하이라이트':'⚡'};
const typeBg    = {'중계':'#001a00','파노라마':'#001a1a','하이라이트':'#1a1a00'};

function renderCamBtns() {
    document.getElementById('cam-btns').innerHTML = curStreams.map((s, si) => `
        <button class="cam-btn" id="cam-${si}"
            style="color:${typeColor[s.type]||'#0f0'};background:${typeBg[s.type]||'#111'};border-color:${typeColor[s.type]||'#0f0'}"
            onclick="playStream(${si})">
            ${typeIcon[s.type]||'📺'}<br>${s.type}
        </button>`).join('');
}

function playStream(si) {
    document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
    const cb = document.getElementById('cam-'+si);
    if(cb) cb.classList.add('active');
    hls.detachMedia();
    hls.loadSource(curStreams[si].url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { hls.currentLevel = -1; video.play(); });
    window.scrollTo(0,0);
}
</script>
</body></html>
