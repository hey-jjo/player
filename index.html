<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate M3U8 Player & Downloader</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Pretendard', sans-serif; }
        .player-card { width: 90%; max-width: 850px; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 20px; }
        .controls { display: flex; gap: 15px; justify-content: center; }
        button { padding: 12px 25px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-play { background: #00c853; color: white; }
        .btn-download { background: #2979ff; color: white; }
        button:disabled { background: #555; cursor: not-allowed; }
        #progress { margin-top: 15px; font-size: 14px; color: #00e676; display: none; }
    </style>
</head>
<body>

<div class="player-card">
    <video id="video" controls autoplay playsinline></video>
    
    <div class="controls">
        <button class="btn-download" id="downloadBtn" onclick="startDownload()">웹에서 직접 다운로드 (TS 합치기)</button>
    </div>
    
    <div id="progress">준비 중...</div>
</div>

<script>
    const video = document.getElementById('video');
    const downloadBtn = document.getElementById('downloadBtn');
    const progressText = document.getElementById('progress');
    const m3u8Url = new URLSearchParams(window.location.search).get('url');

    // 1. 재생 기능
    if (m3u8Url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(m3u8Url);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = m3u8Url;
        }
    }

    // 2. 웹 브라우저 내 직접 다운로드 기능 (TS 수집)
    async function startDownload() {
        if (!m3u8Url) return;
        
        downloadBtn.disabled = true;
        progressText.style.display = 'block';
        progressText.innerText = "M3U8 목록 분석 중...";

        try {
            const response = await fetch(m3u8Url);
            const text = await response.text();
            const lines = text.split('\n');
            const tsUrls = lines.filter(line => line.endsWith('.ts') || line.includes('.ts?'));
            
            if (tsUrls.length === 0) {
                alert("TS 파일 목록을 찾을 수 없습니다. (보안 차단 가능성)");
                return;
            }

            const baseUrl = m3u8Url.substring(0, m3u8Url.lastIndexOf('/') + 1);
            let combinedBlob = [];

            for (let i = 0; i < tsUrls.length; i++) {
                const fullUrl = tsUrls[i].startsWith('http') ? tsUrls[i] : baseUrl + tsUrls[i];
                progressText.innerText = `조각 다운로드 중... (${i + 1} / ${tsUrls.length})`;
                
                const tsRes = await fetch(fullUrl);
                const tsBlob = await tsRes.blob();
                combinedBlob.push(tsBlob);
            }

            progressText.innerText = "파일 합치는 중... 잠시만 기다려주세요.";
            const finalBlob = new Blob(combinedBlob, { type: 'video/mp2t' });
            const downloadUrl = URL.createObjectURL(finalBlob);
            
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = "video_download.ts"; // 합쳐진 TS 파일로 저장
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            progressText.innerText = "다운로드 완료!";
            downloadBtn.disabled = false;

        } catch (error) {
            console.error(error);
            progressText.innerText = "오류 발생: 보안(CORS) 문제로 웹 직접 다운로드가 막혔습니다.";
            downloadBtn.disabled = false;
        }
    }
</script>

</body>
</html>
