<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팔달 리틀 추출 검토</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .container { width: 100%; max-width: 800px; margin: auto; padding: 20px; }
        #video-box { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 10px; margin-bottom: 20px; }
        video { width: 100%; height: 100%; border-radius: 10px; }
        
        /* 추출된 주소 개수만큼 버튼이 생기는 구역 */
        .btn-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .cam-btn { background: #333; color: white; border: 1px solid #555; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .cam-btn.active { background: #2979ff; border-color: #2979ff; }
        
        #loading { padding: 20px; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h3 id="loading">데이터 분석 중... (약 15초 소요)</h3>
    
    <div id="video-box">
        <video id="video" controls playsinline></video>
    </div>

    <div class="btn-list" id="btnList">
        <!-- 추출된 개수만큼 버튼이 생성됩니다 -->
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const btnList = document.getElementById('btnList');
    const loadingText = document.getElementById('loading');
    let hls = null;

    // 💡 테스트할 오라클 API 주소
    const API = "http://146.56.111.100:3000/api/extract?url=";

    async function checkAndConnect() {
        const params = new URLSearchParams(window.location.search);
        const pochakUrl = params.get('url');

        if(!pochakUrl) {
            loadingText.innerText = "❌ URL 파라미터가 없습니다.";
            return;
        }

        try {
            // 서버에 데이터 요청
            const res = await fetch(API + encodeURIComponent(pochakUrl));
            const data = await res.json();

            if(data.success && data.urls.length > 0) {
                loadingText.innerText = `✅ 총 ${data.urls.length}개의 카메라 발견!`;
                
                // 1. 주소 개수만큼 버튼 생성
                renderButtons(data.urls);
                
                // 2. 첫 번째 영상(HD1) 바로 재생
                playVideo(data.urls[0], 0);
            } else {
                loadingText.innerText = "❌ 서버에서 주소를 가져오지 못했습니다.";
            }
        } catch (e) {
            loadingText.style.color = "red";
            loadingText.innerHTML = "⚠️ Failed to fetch (보안 차단)<br><small>브라우저 설정에서 '안전하지 않은 콘텐츠'를 허용해주세요.</small>";
        }
    }

    function renderButtons(urls) {
        btnList.innerHTML = "";
        urls.forEach((url, index) => {
            const btn = document.createElement('button');
            btn.className = 'cam-btn';
            
            // 이름 구분 로직
            if(url.includes('hd1')) btn.innerText = "🎥 AI 고화질";
            else if(url.includes('hd0')) btn.innerText = "🎥 AI 저화질";
            else if(url.includes('pano1')) btn.innerText = "🌐 파노라마 1";
            else if(url.includes('pano0')) btn.innerText = "🌐 파노라마 2";
            else btn.innerText = "📹 카메라 " + (index + 1);

            btn.onclick = () => playVideo(url, index);
            btnList.appendChild(btn);
        });
    }

    function playVideo(url, idx) {
        // 버튼 불 들어오게 함
        const btns = document.querySelectorAll('.cam-btn');
        btns.forEach((b, i) => b.classList.toggle('active', i === idx));

        if (hls) hls.destroy();

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }

    checkAndConnect();
</script>

</body>
</html>
