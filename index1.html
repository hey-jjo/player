<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팔달 리틀 응원 플레이어 & 다운로더</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:#121212; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Pretendard',sans-serif; }
.player-card { width:90%; max-width:850px; background:#1e1e1e; padding:30px 20px; border-radius:20px; text-align:center; border:1px solid #333; }
video { width:100%; border-radius:12px; background:#000; margin-bottom:20px; }
.controls { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
button,select { padding:12px; border-radius:8px; }
.btn-download { background:#2979ff; color:white; border:none; }
#progress { margin-top:10px; display:none; }
</style>
</head>

<body>
<div class="player-card">
    <video id="video" controls playsinline></video>

    <div class="controls">
        <select id="formatSelect">
            <option value="ts">TS</option>
            <option value="mp4">MP4</option>
        </select>
        <button class="btn-download" id="downloadBtn" disabled>다운로드</button>
    </div>

    <div id="progress"></div>
</div>

<script>
const video = document.getElementById('video');
const downloadBtn = document.getElementById('downloadBtn');
const progressText = document.getElementById('progress');
const formatSelect = document.getElementById('formatSelect');

let m3u8Url = "";

// 🔥 URL 파싱 (깨짐 방지)
function getUrlParam(){
    const idx = location.href.indexOf("?url=");
    if(idx === -1) return "";
    return decodeURIComponent(location.href.substring(idx + 5));
}

// 🔥 포착 전용 m3u8 추출
async function extractM3U8FromPage(pageUrl){
    try{
        // 1. HTML 가져오기
        const res = await fetch(pageUrl);
        const text = await res.text();

        // ❌ HTML에는 거의 없음 → 실패 가능
        let match = text.match(/https?:\/\/[^"]+\.m3u8[^"]*/);
        if(match) return match[0];

        // 2. API 직접 호출 (핵심)
        const url = new URL(pageUrl);
        const id = url.searchParams.get("id");

        if(!id) return null;

        const apiList = [
            `https://pochak.live/api/vod/${id}`,
            `https://pochak.live/api/vod/detail?id=${id}`,
            `https://pochak.live/api/video/${id}`
        ];

        for(const api of apiList){
            try{
                const r = await fetch(api);
                const j = await r.json();

                const str = JSON.stringify(j);
                const m = str.match(/https?:\/\/[^"]+\.m3u8[^"]*/);

                if(m) return m[0];
            }catch(e){}
        }

        return null;

    }catch(e){
        console.error(e);
        return null;
    }
}

// 🔥 플레이어 시작
async function init(){
    let inputUrl = getUrlParam();

    if(!inputUrl){
        showError("URL 없음");
        return;
    }

    progressText.style.display = "block";
    progressText.innerText = "영상 주소 분석 중...";

    // m3u8인지 확인
    if(inputUrl.includes(".m3u8")){
        m3u8Url = inputUrl;
    }else{
        m3u8Url = await extractM3U8FromPage(inputUrl);
    }

    if(!m3u8Url){
        showError("m3u8 추출 실패");
        return;
    }

    progressText.innerText = "재생 준비 완료";

    startPlayer(m3u8Url);
    downloadBtn.disabled = false;
}

// 🔥 플레이어
function startPlayer(url){
    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// 🔥 에러 표시
function showError(msg){
    progressText.style.display = "block";
    progressText.style.color = "red";
    progressText.innerText = msg;
}

// 🔥 다운로드 (기존 유지)
downloadBtn.addEventListener('click', async ()=>{
    if(!m3u8Url) return;

    const format = formatSelect.value;
    progressText.innerText = "m3u8 분석 중...";

    const res = await fetch(m3u8Url);
    const text = await res.text();

    const lines = text.split("\n").filter(l => l && !l.startsWith("#"));
    const base = m3u8Url.substring(0, m3u8Url.lastIndexOf("/") + 1);

    let blobs = [];

    for(let i=0;i<lines.length;i++){
        const url = lines[i].startsWith("http") ? lines[i] : base + lines[i];
        const r = await fetch(url);
        blobs.push(await r.blob());

        progressText.innerText = `다운로드 ${i+1}/${lines.length}`;
    }

    const finalBlob = new Blob(blobs, {type: format==="mp4" ? "video/mp4":"video/mp2t"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(finalBlob);
    a.download = "video."+format;
    a.click();

    progressText.innerText = "완료";
});

// 실행
init();
</script>

</body>
</html>
