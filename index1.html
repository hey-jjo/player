<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연결 테스트</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .result-box { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-top: 20px; }
        .btn-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .cam-btn { background: #2979ff; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { color: #ffeb3b; }
    </style>
</head>
<body>

    <h2>📡 오라클 서버 연결 확인</h2>
    <p id="status">대기 중...</p>

    <div class="result-box">
        <div id="btnList" class="btn-list">
            <!-- 서버 응답 성공 시 버튼이 여기에 생깁니다 -->
        </div>
        <pre id="rawJson" style="text-align: left; font-size: 12px; color: #888; overflow: auto;"></pre>
    </div>

<script>
    const statusText = document.getElementById('status');
    const btnList = document.getElementById('btnList');
    const rawJson = document.getElementById('rawJson');

    const API = "http://146.56.111.100:3000/api/extract?url=";

    async function testConnect() {
        const params = new URLSearchParams(window.location.search);
        const pochakUrl = params.get('url');

        if(!pochakUrl) {
            statusText.innerText = "❌ URL 파라미터가 없습니다. (?url=포착주소 붙이세요)";
            return;
        }

        statusText.innerText = "⏳ 서버에서 주소 털어오는 중... (약 15초)";

        try {
            const res = await fetch(API + encodeURIComponent(pochakUrl));
            const data = await res.json();

            // 원본 데이터 출력
            rawJson.innerText = JSON.stringify(data, null, 2);

            if(data.success) {
                statusText.innerText = "✅ 연결 성공! 버튼이 생성되었습니다.";
                data.urls.forEach((url, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'cam-btn';
                    btn.innerText = `카메라 ${i+1}: ${url.split('/').slice(-3).join('/')}`;
                    btn.onclick = () => alert("재생 주소: " + url);
                    btnList.appendChild(btn);
                });
            } else {
                statusText.innerText = "❌ 서버는 응답했으나 주소 추출 실패: " + data.message;
            }
        } catch (e) {
            statusText.style.color = "red";
            statusText.innerHTML = "⚠️ 연결 차단됨 (HTTPS 보안 장벽)<br>아래 [확인 방법] 링크를 클릭해서 접속하세요!";
        }
    }

    testConnect();
</script>
</body>
</html>
