<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팔달 리틀 멀티캠 통합관제</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .player-wrap { width: 100%; max-width: 850px; margin: auto; }
        video { width: 100%; border-radius: 15px; background: #111; border: 1px solid #333; margin-bottom: 20px; }
        
        /* 버튼 그리드 세팅 */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .cam-btn { 
            background: #222; color: #fff; border: 1px solid #444; padding: 15px; 
            border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .cam-btn:hover { background: #333; }
        .cam-btn.active { background: #2979ff; border-color: #2979ff; box-shadow: 0 0 15px rgba(41, 121, 255, 0.5); }
        
        #status { color: #ffeb3b; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="player-wrap">
    <h2 style="color: #00e676;">📽️ 팔달 리틀 시점 선택</h2>
    <div id="status">오라클 서버에서 비밀 코드 탈취 중...</div>
    
    <video id="video" controls playsinline></video>

    <div class="grid-container" id="controls" style="display: none;">
        <button class="cam-btn" onclick="changeCam('hd_hls/hd1/hd.m3u8', this)">📽️ AI 고화질 (메인)</button>
        <button class="cam-btn" onclick="changeCam('pano_hls/pano1/pano.m3u8', this)">🌐 파노라마 1</button>
        <button class="cam-btn" onclick="changeCam('pano_hls/pano0/pano.m3u8', this)">🌐 파노라마 2</button>
        <button class="cam-btn" onclick="changeCam('hd_hls/hd0/hd.m3u8', this)">🎥 AI 저화질</button>
        <button class="cam-btn" onclick="changeCam('highlights_hls/highlights1/highlights.m3u8', this)" style="grid-column: span 2;">✂️ 하이라이트 보기</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const controls = document.getElementById('controls');
    let hls = null;
    let currentId = "";

    // 고정 주소 및 API
    const pochakUrl = new URLSearchParams(window.location.search).get('url');
    const API = "http://146.56.111.100:3000/api/extract?url=";

    async function init() {
        if (!pochakUrl) {
            status.innerText = "❌ URL이 없습니다.";
            return;
        }

        try {
            const res = await fetch(API + encodeURIComponent(pochakUrl));
            const data = await res.json();

            if (data.success) {
                currentId = data.assetId;
                status.innerText = "✅ 시점을 선택하세요 (ID: " + currentId.substring(0,6) + "...)";
                controls.style.display = "grid";
                
                // 기본으로 AI 고화질 재생
                changeCam('hd_hls/hd1/hd.m3u8', document.querySelector('.cam-btn'));
            } else {
                status.innerText = "❌ ID 탈취 실패: " + data.message;
            }
        } catch (e) {
            status.innerText = "❌ 서버 연결 에러 (보안 설정 확인)";
        }
    }

    function changeCam(path, btn) {
        const fullUrl = `https://dnw98ykn7b9iq.cloudfront.net/yst/${currentId}/venue_hls/${path}`;
        
        // 버튼 활성화 스타일
        document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(fullUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = fullUrl;
            video.play();
        }
    }

    init();
</script>

</body>
</html>
