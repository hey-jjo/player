<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pochak Auto Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .video-container { max-width: 900px; margin: 20px auto; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-js { width: 100%; aspect-ratio: 16 / 9; }
        .controls { background: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 860px; margin: 0 auto; }
        input { width: 70%; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #2b2b2b; color: #fff; }
        button.main-btn { padding: 12px 25px; background: #e91e63; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 20px; }
        .angle-btn { padding: 12px; background: #333; color: #ccc; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .angle-btn.active { background: #00bcd4; color: white; }
        #loading { display: none; color: #ffeb3b; margin: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎬 Pochak Auto Player</h1>

    <div class="controls">
        <input type="text" id="vodUrl" placeholder="포착 VOD 주소 (https://pochak.live/...)">
        <button class="main-btn" onclick="fetchAndPlay()">영상 재생</button>
        <div id="loading">🚀 서버에서 ID 추출 중... 잠시만 기다려주세요.</div>
    </div>

    <div class="video-container">
        <video id="main-player" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <div class="controls" id="angle-section" style="display:none;">
        <div class="btn-group">
            <button class="angle-btn active" onclick="changeAngle('hd1', this)">HD 1</button>
            <button class="angle-btn" onclick="changeAngle('hd0', this)">HD 0</button>
            <button class="angle-btn" onclick="changeAngle('pano1', this)">PANO 1</button>
            <button class="angle-btn" onclick="changeAngle('pano0', this)">PANO 0</button>
            <button class="angle-btn" onclick="changeAngle('high1', this)">하이라이트 1</button>
            <button class="angle-btn" onclick="changeAngle('high0', this)">하이라이트 0</button>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('main-player');
        let currentId = "";
        const SERVER_IP = "146.56.111.100:3000"; // 선생님의 오라클 서버 IP

        // 핵심: 페이지 로드 시 URL 파라미터 확인
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const targetUrl = params.get('url'); 
            if (targetUrl) {
                document.getElementById('vodUrl').value = targetUrl;
                fetchAndPlay(); // 파라미터 있으면 즉시 추출 시작
            }
        };

        async function fetchAndPlay() {
            const url = document.getElementById('vodUrl').value.trim();
            if(!url) return;

            document.getElementById('loading').style.display = "block";
            document.getElementById('angle-section').style.display = "none";
            
            try {
                const response = await fetch(`http://${SERVER_IP}/get_video?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if(data.success) {
                    currentId = data.video_id;
                    document.getElementById('angle-section').style.display = "block";
                    changeAngle('hd1', document.querySelector('.angle-btn.active'));
                } else {
                    alert("추출 실패: " + (data.message || "알 수 없는 에러"));
                }
            } catch (e) {
                alert("서버 연결 실패! 오라클 서버의 server.py가 실행 중인지 확인하세요.");
            } finally {
                document.getElementById('loading').style.display = "none";
            }
        }

        function changeAngle(mode, btn) {
            if(!currentId) return;
            const base = `https://dnw98ykn7b9iq.cloudfront.net/yst/${currentId}/venue_hls`;
            const paths = {
                'hd1': '/hd_hls/hd1/hd.m3u8', 'hd0': '/hd_hls/hd0/hd.m3u8',
                'pano1': '/pano_hls/pano1/pano.m3u8', 'pano0': '/pano_hls/pano0/pano.m3u8',
                'high1': '/highlights_hls/highlights1/highlights.m3u8', 'high0': '/highlights_hls/highlights0/highlights.m3u8'
            };

            document.querySelectorAll('.angle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            player.src({ src: base + paths[mode], type: 'application/x-mpegURL' });
            player.play();
        }
    </script>
</body>
</html>
