<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팔달 리틀 멀티캠 플레이어</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; padding: 20px; }
        .container { width: 100%; max-width: 800px; text-align: center; }
        video { width: 100%; border-radius: 12px; background: #000; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .cam-btn { background: #333; color: #fff; border: 1px solid #555; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .cam-btn.active { background: #2979ff; border-color: #2979ff; font-weight: bold; }
        .status-box { padding: 10px; font-size: 14px; margin-bottom: 10px; border-radius: 8px; display: none; }
        .error { background: rgba(255, 82, 82, 0.2); color: #ff5252; border: 1px solid #ff5252; }
        .success { background: rgba(0, 230, 118, 0.2); color: #00e676; border: 1px solid #00e676; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #ffeb3b;">⚾ 팔달 리틀 멀티캠 중계 ⚾</h2>
    
    <div id="status" class="status-box"></div>

    <video id="video" controls playsinline></video>
    
    <div class="btn-group" id="camButtons">
        <!-- 서버에서 주소를 받으면 여기에 버튼이 생성됩니다 -->
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const statusBox = document.getElementById('status');
    const camButtons = document.getElementById('camButtons');
    let hls = null;

    // 💡 오라클 서버 API 주소
    const API_URL = "http://146.56.111.100:3000/api/extract?url=";

    // 1. 주소창에서 포착 URL 가져오기
    const urlParams = new URLSearchParams(window.location.search);
    const targetUrl = urlParams.get('url');

    function showStatus(msg, type) {
        statusBox.innerText = msg;
        statusBox.className = `status-box ${type}`;
        statusBox.style.display = 'block';
    }

    async function init() {
        if (!targetUrl) {
            showStatus("❌ URL 파라미터가 없습니다.", "error");
            return;
        }

        showStatus("🔍 오라클 서버에서 주소 추출 중...", "success");

        try {
            // 2. 오라클 서버에 요청
            const response = await fetch(API_URL + encodeURIComponent(targetUrl));
            const data = await response.json();

            if (data.success && data.urls.length > 0) {
                showStatus("✅ 추출 완료! 시점을 선택하세요.", "success");
                createButtons(data.urls);
                // 첫 번째 주소(보통 고화질) 자동 재생
                playStream(data.urls[0]);
            } else {
                showStatus("❌ 주소를 찾지 못했습니다: " + (data.message || "알 수 없는 에러"), "error");
            }
        } catch (e) {
            console.error(e);
            showStatus("❌ 서버 연결 실패! (브라우저 설정에서 '안전하지 않은 콘텐츠 허용'을 확인하세요)", "error");
        }
    }

    function createButtons(urls) {
        camButtons.innerHTML = "";
        urls.forEach((url, index) => {
            const btn = document.createElement('button');
            btn.className = 'cam-btn';
            
            // 이름 예쁘게 붙이기
            if(url.includes('hd1')) btn.innerText = "🎥 AI 고화질";
            else if(url.includes('hd0')) btn.innerText = "🎥 AI 저화질";
            else if(url.includes('pano1')) btn.innerText = "🌐 파노라마 1";
            else if(url.includes('pano0')) btn.innerText = "🌐 파노라마 2";
            else btn.innerText = "📹 카메라 " + (index + 1);

            btn.onclick = () => {
                document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                playStream(url);
            };
            camButtons.appendChild(btn);
        });
        if(camButtons.firstChild) camButtons.firstChild.classList.add('active');
    }

    function playStream(url) {
        if (hls) hls.destroy();

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }

    init();
</script>

</body>
</html>
