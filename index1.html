<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자동 M3U8 플레이어</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  background: #121212;
  color: white;
  text-align: center;
  font-family: sans-serif;
  padding: 20px;
}
input {
  width: 90%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}
button {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #2979ff;
  color: white;
  font-weight: bold;
}
video {
  width: 100%;
  margin-top: 20px;
  border-radius: 12px;
  background: black;
}
#log {
  margin-top: 15px;
  font-size: 14px;
  color: #00e676;
}
</style>
</head>

<body>

<h2>포착 자동 재생</h2>

<input id="urlInput" placeholder="포착 URL 넣기">
<br>
<button onclick="start()">재생</button>

<video id="video" controls playsinline></video>
<div id="log"></div>

<script>
const video = document.getElementById('video');
const log = document.getElementById('log');

function setLog(msg) {
  log.innerText = msg;
}

// 🔥 최고 화질 선택
function pickBest(urls) {
  return urls.sort((a, b) => {
    const getQ = u => parseInt(u.match(/(\d{3,4})\.m3u8/)?.[1] || 0);
    return getQ(b) - getQ(a);
  })[0];
}

// 🔥 m3u8 추출 (단순 패턴 기반)
async function extract(pageUrl) {
  setLog("페이지 분석 중...");

  const res = await fetch(pageUrl);
  const html = await res.text();

  // m3u8 후보 전부 찾기
  const matches = [...html.matchAll(/https?:\/\/[^"' ]+\.m3u8/g)]
    .map(m => m[0]);

  if (matches.length === 0) {
    throw "m3u8 못찾음";
  }

  setLog(`m3u8 ${matches.length}개 발견`);

  return pickBest(matches);
}

// 🔥 재생
function play(m3u8) {
  setLog("재생 시작");

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(m3u8);
    hls.attachMedia(video);
  } else {
    video.src = m3u8;
  }
}

// 🔥 시작
async function start() {
  const url = document.getElementById('urlInput').value;

  try {
    const m3u8 = await extract(url);

    setLog("선택된 URL: " + m3u8);

    play(m3u8);

  } catch (e) {
    setLog("실패: " + e);
  }
}
</script>

</body>
</html>
